<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/xp.css' | relative_url }}">
</head>
<body>

  <!-- Desktop -->
  <div id="desktop">

    <div class="d-icon" data-url="{{ '/resume/' | relative_url }}" data-title="Resume">
      <svg class="d-icon-img" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ie-globe" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#5AABFF"/>
            <stop offset="100%" stop-color="#1565C0"/>
          </radialGradient>
        </defs>
        <circle cx="24" cy="24" r="22" fill="url(#ie-globe)"/>
        <ellipse cx="24" cy="24" rx="10" ry="22" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <ellipse cx="24" cy="24" rx="22" ry="9"  fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <line x1="2" y1="24" x2="46" y2="24" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <text x="24" y="33" text-anchor="middle" font-family="Times New Roman,serif" font-style="italic" font-weight="bold" font-size="26" fill="white">e</text>
        <ellipse cx="24" cy="24" rx="22" ry="8" fill="none" stroke="#FFD600" stroke-width="3.5" transform="rotate(-35 24 24)"/>
      </svg>
      <span class="d-icon-label">Resume</span>
    </div>

    <div class="d-icon" data-url="{{ '/projects/' | relative_url }}" data-title="Projects">
      <svg class="d-icon-img" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <use href="#ie-globe-ref"/>
        <circle cx="24" cy="24" r="22" fill="url(#ie-globe)"/>
        <ellipse cx="24" cy="24" rx="10" ry="22" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <ellipse cx="24" cy="24" rx="22" ry="9"  fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <line x1="2" y1="24" x2="46" y2="24" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <text x="24" y="33" text-anchor="middle" font-family="Times New Roman,serif" font-style="italic" font-weight="bold" font-size="26" fill="white">e</text>
        <ellipse cx="24" cy="24" rx="22" ry="8" fill="none" stroke="#FFD600" stroke-width="3.5" transform="rotate(-35 24 24)"/>
      </svg>
      <span class="d-icon-label">Projects</span>
    </div>

    <div class="d-icon" data-url="{{ '/about/' | relative_url }}" data-title="About">
      <svg class="d-icon-img" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="22" fill="url(#ie-globe)"/>
        <ellipse cx="24" cy="24" rx="10" ry="22" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <ellipse cx="24" cy="24" rx="22" ry="9"  fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <line x1="2" y1="24" x2="46" y2="24" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <text x="24" y="33" text-anchor="middle" font-family="Times New Roman,serif" font-style="italic" font-weight="bold" font-size="26" fill="white">e</text>
        <ellipse cx="24" cy="24" rx="22" ry="8" fill="none" stroke="#FFD600" stroke-width="3.5" transform="rotate(-35 24 24)"/>
      </svg>
      <span class="d-icon-label">About Me</span>
    </div>

  </div>

  <!-- IE windows injected here -->
  <div id="windows"></div>

  <!-- Taskbar -->
  <div id="taskbar">

    <button id="start-btn">
      <!-- Windows XP flag logo -->
      <svg class="win-flag" width="20" height="20" viewBox="0 0 20 20">
        <rect x="1"  y="1"  width="8" height="8" rx="1" fill="#F25022"/>
        <rect x="11" y="1"  width="8" height="8" rx="1" fill="#7FBA00"/>
        <rect x="1"  y="11" width="8" height="8" rx="1" fill="#00A4EF"/>
        <rect x="11" y="11" width="8" height="8" rx="1" fill="#FFB900"/>
      </svg>
      <span>start</span>
    </button>

    <div id="tray-windows"></div>

    <div id="systray">
      <!-- volume icon -->
      <svg width="14" height="14" viewBox="0 0 14 14" style="margin-right:4px;opacity:0.85">
        <polygon points="1,5 5,5 8,2 8,12 5,9 1,9" fill="#fff"/>
        <path d="M9.5,4.5 Q11,7 9.5,9.5" stroke="#fff" stroke-width="1.2" fill="none"/>
        <path d="M10.5,3 Q13,7 10.5,11" stroke="#fff" stroke-width="1.2" fill="none" opacity="0.6"/>
      </svg>
      <div id="clock">00:00</div>
    </div>
  </div>

  <!-- Start Menu -->
  <div id="start-menu" class="hidden">

    <!-- Header band with username -->
    <div class="sm-header">
      <div class="sm-avatar">&#128100;</div>
      <span class="sm-username">Errol Pascua</span>
    </div>

    <!-- Two-column body -->
    <div class="sm-body">

      <!-- Left: white programs panel -->
      <div class="sm-left">
        <div class="sm-section-label">Internet</div>

        <div class="sm-item" data-url="{{ '/resume/' | relative_url }}" data-title="Resume">
          <svg class="sm-ie-icon" viewBox="0 0 16 16">
            <circle cx="8" cy="8" r="7" fill="#1565C0"/>
            <text x="8" y="11.5" text-anchor="middle" font-family="Times New Roman,serif" font-style="italic" font-weight="bold" font-size="9" fill="white">e</text>
            <ellipse cx="8" cy="8" rx="7" ry="2.5" fill="none" stroke="#FFD600" stroke-width="1" transform="rotate(-35 8 8)"/>
          </svg>
          <span>Resume</span>
        </div>

        <div class="sm-item" data-url="{{ '/projects/' | relative_url }}" data-title="Projects">
          <svg class="sm-ie-icon" viewBox="0 0 16 16">
            <circle cx="8" cy="8" r="7" fill="#1565C0"/>
            <text x="8" y="11.5" text-anchor="middle" font-family="Times New Roman,serif" font-style="italic" font-weight="bold" font-size="9" fill="white">e</text>
            <ellipse cx="8" cy="8" rx="7" ry="2.5" fill="none" stroke="#FFD600" stroke-width="1" transform="rotate(-35 8 8)"/>
          </svg>
          <span>Projects</span>
        </div>

        <div class="sm-item" data-url="{{ '/about/' | relative_url }}" data-title="About Me">
          <svg class="sm-ie-icon" viewBox="0 0 16 16">
            <circle cx="8" cy="8" r="7" fill="#1565C0"/>
            <text x="8" y="11.5" text-anchor="middle" font-family="Times New Roman,serif" font-style="italic" font-weight="bold" font-size="9" fill="white">e</text>
            <ellipse cx="8" cy="8" rx="7" ry="2.5" fill="none" stroke="#FFD600" stroke-width="1" transform="rotate(-35 8 8)"/>
          </svg>
          <span>About Me</span>
        </div>

        <div class="sm-divider"></div>

        <div class="sm-section-label">All Programs &#9658;</div>
      </div>

      <!-- Right: blue system folders panel -->
      <div class="sm-right">
        <div class="sm-section-label">&#x1F4C1; My Documents</div>

        <div class="sm-item">
          <!-- folder icon -->
          <svg class="sm-folder-icon" viewBox="0 0 20 16">
            <path d="M1,3 L7,3 L8,1 L19,1 L19,15 L1,15 Z" fill="#F5C842"/>
            <path d="M1,4 L19,4 L19,15 L1,15 Z" fill="#FFDC5A"/>
          </svg>
          <span>My Documents</span>
        </div>

        <div class="sm-item">
          <svg class="sm-folder-icon" viewBox="0 0 20 16">
            <path d="M1,3 L7,3 L8,1 L19,1 L19,15 L1,15 Z" fill="#F5C842"/>
            <path d="M1,4 L19,4 L19,15 L1,15 Z" fill="#FFDC5A"/>
          </svg>
          <span>My Computer</span>
        </div>

        <div class="sm-item">
          <svg class="sm-folder-icon" viewBox="0 0 20 16">
            <path d="M1,3 L7,3 L8,1 L19,1 L19,15 L1,15 Z" fill="#F5C842"/>
            <path d="M1,4 L19,4 L19,15 L1,15 Z" fill="#FFDC5A"/>
          </svg>
          <span>My Network</span>
        </div>

        <div class="sm-divider"></div>

        <div class="sm-item">
          <svg class="sm-folder-icon" viewBox="0 0 20 16">
            <rect x="1" y="1" width="18" height="14" rx="2" fill="#D4E4F8" stroke="#6090C8" stroke-width="1"/>
            <rect x="3" y="4" width="14" height="2" fill="#6090C8"/>
          </svg>
          <span>Control Panel</span>
        </div>
      </div>

    </div><!-- /sm-body -->

    <!-- Footer with Log Off / Turn Off -->
    <div class="sm-footer">
      <button class="sm-footer-btn">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <circle cx="7" cy="7" r="6" fill="none" stroke="#6A6A6A" stroke-width="1.5"/>
          <line x1="7" y1="2" x2="7" y2="7" stroke="#6A6A6A" stroke-width="2"/>
        </svg>
        Log Off
      </button>
      <button class="sm-footer-btn">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <circle cx="7" cy="7" r="5" fill="#CC3030"/>
        </svg>
        Turn Off Computer
      </button>
    </div>

  </div><!-- /start-menu -->

  <script src="{{ '/assets/xp.js' | relative_url }}"></script>
</body>
</html>
