<footer class="site-footer h-card">
  <div class="wrapper">
    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <p class="footer-heading">{{ site.title | escape }}</p>

        <p class="contact-list">
          <a href="https://www.linkedin.com/in/errol-pascua" target="_blank" rel="noopener">
            LinkedIn
          </a>
        </p>
      </div>
    </div>
  </div>
</footer>

<script>
(function () {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var targets = document.querySelectorAll(
    '.page-content h2, .page-content h3, .page-content h4, ' +
    '.page-content p, .page-content ul, .page-content ol, ' +
    '.page-content table, .page-content blockquote, ' +
    '.page-content img'
  );

  targets.forEach(function (el, i) {
    el.classList.add('reveal');
    var delay = Math.min(i % 5, 4);
    if (delay > 0) el.classList.add('delay-' + delay);
  });

  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal').forEach(function (el) {
    observer.observe(el);
  });
})();
</script>
